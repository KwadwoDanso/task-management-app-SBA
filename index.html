<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Management App</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <header>
        <h1>Task Manager</h1>
    </header>

    <main>

        <!-- Add Task -->
        <section aria-labelledby="add-heading">
            <h2 id="add-heading">Add a Task</h2>

            <form onsubmit="addTask(); return false;" novalidate>

                <div class="form-group">
                    <label for="taskName">Task Name</label>
                    <input type="text" id="taskName" name="taskName" placeholder="Enter task name" autocomplete="off"
                        required />
                </div>

                <div class="form-group">
                    <label for="taskCategory">Category</label>
                    <input type="text" id="taskCategory" name="taskCategory" placeholder="e.g. Work, Personal"
                        autocomplete="off" required />
                </div>

                <div class="form-group">
                    <label for="taskDeadline">Deadline</label>
                    <input type="date" id="taskDeadline" name="taskDeadline" required />
                </div>

                <div class="form-group">
                    <label for="taskStatus">Status</label>
                    <select id="taskStatus" name="taskStatus">
                        <option value="In Progress">In Progress</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>

                <button type="submit">Add Task</button>
                <p id="errorMessage" role="alert" aria-live="polite"></p>

            </form>
        </section>

        <!-- Filter Tasks -->
        <section aria-labelledby="filter-heading">
            <h2 id="filter-heading">Filter Tasks</h2>

            <fieldset>
                <legend class="visually-hidden">Filter options</legend>

                <div class="form-group">
                    <label for="filterStatus">Filter by Status</label>
                    <select id="filterStatus" name="filterStatus" onchange="renderTasks()">
                        <option value="All">All Statuses</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Completed">Completed</option>
                        <option value="Overdue">Overdue</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="filterCategory">Filter by Category</label>
                    <select id="filterCategory" name="filterCategory" onchange="renderTasks()">
                        <option value="All">All Categories</option>
                    </select>
                </div>

            </fieldset>
        </section>

        <!-- Task List -->
        <section aria-labelledby="list-heading">
            <h2 id="list-heading">Task List</h2>
            <ul id="taskList" aria-live="polite" aria-label="Task list"></ul>
        </section>

    </main>

    <footer>
        <p>Task Manager &mdash; All tasks saved locally in your browser.</p>
    </footer>

    <script src="app.js"></script>
</body>

</html>
